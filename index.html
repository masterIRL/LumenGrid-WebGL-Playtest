<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>LUMEN GRID</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-shell">
      <div id="orientation-message">
        <strong>LUMEN GRID</strong>
        <span>Rotate to landscape. Tournez en paysage pour jouer au tutoriel.</span>
      </div>
      <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
          <div id="unity-loading-title">LUMEN GRID</div>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
        </div>
        <div id="unity-warning"></div>
        <button id="unity-fullscreen-button" type="button" aria-label="Fullscreen / Plein ecran">Fullscreen / Plein ecran</button>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var container = document.querySelector("#unity-container");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        div.className = type === "error" ? "unity-banner-error" : "unity-banner-warning";
        warningBanner.appendChild(div);
        if (type !== "error") {
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      function isMobileLike() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 900;
      }

      function resizeCanvasElement() {
        var viewport = window.visualViewport;
        var width = viewport ? viewport.width : window.innerWidth;
        var height = viewport ? viewport.height : window.innerHeight;
        container.style.width = Math.max(1, Math.floor(width)) + "px";
        container.style.height = Math.max(1, Math.floor(height)) + "px";
      }

      resizeCanvasElement();
      window.addEventListener("resize", resizeCanvasElement);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resizeCanvasElement);
      }

      var buildUrl = "Build";
      var cacheBust = "v=" + Date.now();
      var loaderUrl = buildUrl + "/WebGLPlaytest.loader.js?" + cacheBust;
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGLPlaytest.data?" + cacheBust,
        frameworkUrl: buildUrl + "/WebGLPlaytest.framework.js?" + cacheBust,
        codeUrl: buildUrl + "/WebGLPlaytest.wasm?" + cacheBust,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "LUMEN GRID",
        productVersion: "0.1.0",
        showBanner: unityShowBanner
      };

      config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, isMobileLike() ? 1.5 : 2);

      document.querySelector("#unity-loading-bar").style.display = "flex";
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
        }).then(function(unityInstance) {
          document.querySelector("#unity-loading-bar").style.display = "none";
          fullscreenButton.addEventListener("click", function() {
            if (container.requestFullscreen) {
              container.requestFullscreen();
            }
            unityInstance.SetFullscreen(1);
          });
        }).catch(function(message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
